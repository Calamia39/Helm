controller:
  service:
    type: LoadBalancer
    loadBalancerIP: 192.168.1.199
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  
  config:
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"